<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Zeus Slot AAA Modern</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background: radial-gradient(circle at top,#2b0000,#000);
    color:white;
    text-align:center;
    overflow:hidden;
}

/* animated lightning bg */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background: radial-gradient(circle, rgba(255,215,0,0.05), transparent);
    animation:flash 6s infinite;
    pointer-events:none;
}

@keyframes flash{
    0%,100%{opacity:0;}
    50%{opacity:1;}
}

/* HEADER */
h1{
    color:gold;
    text-shadow:0 0 25px gold;
    margin-top:10px;
}

/* TOP UI */
.ui{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin-top:10px;
}

.card{
    background:rgba(0,0,0,0.5);
    border:1px solid gold;
    padding:8px 14px;
    border-radius:10px;
    font-size:14px;
}

/* SLOT FRAME */
.frame{
    margin-top:20px;
    display:inline-block;
    padding:10px;
    background:linear-gradient(#1a0000,#000);
    border:2px solid gold;
    border-radius:12px;
    box-shadow:0 0 30px rgba(255,215,0,0.2);
}

/* GRID */
.board{
    display:grid;
    grid-template-columns: repeat(5,60px);
    grid-template-rows: repeat(3,60px);
    gap:6px;
}

/* CELL */
.cell{
    width:60px;
    height:60px;
    background:#120000;
    border:1px solid gold;
    border-radius:8px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    transition:0.2s;
}

/* spin blur */
.spin{
    filter:blur(3px);
    transform:scale(0.95);
}

/* win glow */
.win{
    background:#004d00 !important;
    box-shadow:0 0 15px lime;
    transform:scale(1.1);
}

/* BUTTONS */
button{
    padding:10px 18px;
    margin:5px;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

.spinbtn{background:gold;}
.autobtn{background:#00bcd4;}

/* POPUP */
.overlay{
    position:fixed;
    width:100%;
    height:100%;
    top:0;left:0;
    background:rgba(0,0,0,0.85);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:999;
}

.overlay h1{
    font-size:50px;
    color:gold;
}

.amount{
    font-size:40px;
    color:#00ffcc;
}

/* SHAKE */
.shake{
    animation:shake 0.4s;
}

@keyframes shake{
    0%{transform:translate(0,0);}
    25%{transform:translate(5px,0);}
    50%{transform:translate(-5px,0);}
    75%{transform:translate(5px,0);}
    100%{transform:translate(0,0);}
}
</style>
</head>

<body>

<h1>⚡ ZEUS SLOT AAA MODERN ⚡</h1>

<div class="ui">
<div class="card">💰 <span id="p">1000</span></div>
<div class="card">⭐ LV <span id="l">1</span></div>
<div class="card">🔥 XP <span id="x">0</span></div>
<div class="card">🎁 FS <span id="fs">0</span></div>
</div>

<div class="frame">
<div class="board" id="board"></div>
</div>

<br>

<button class="spinbtn" onclick="spin()">SPIN ⚡</button>
<button class="autobtn" onclick="autoToggle()">AUTO</button>

<div id="res"></div>

<!-- WIN POPUP -->
<div class="overlay" id="win">
    <h1>🎉 BIG WIN 🎉</h1>
    <div class="amount" id="amt">0</div>
    <button onclick="closeWin()">CONTINUE</button>
</div>

<script>
let p=1000,x=0,fs=0,auto=false;

const sym=["⚡","👑","💰","🔥","💎","🌟"];

let board=document.getElementById("board");
let cells=[];

/* GRID */
for(let i=0;i<15;i++){
    let d=document.createElement("div");
    d.className="cell";
    d.innerText="❔";
    board.appendChild(d);
    cells.push(d);
}

function r(){
    return sym[Math.floor(Math.random()*sym.length)];
}

/* WIN POPUP */
function show(v){
    document.getElementById("win").style.display="flex";
    document.getElementById("amt").innerText="+"+v;
}
function closeWin(){
    document.getElementById("win").style.display="none";
}

/* ANIMATED SPIN */
function spinAnim(cb){
    let t=setInterval(()=>{
        cells.forEach(c=>{
            c.classList.add("spin");
            c.innerText=r();
        });
    },60);

    setTimeout(()=>{
        clearInterval(t);
        cells.forEach(c=>c.classList.remove("spin"));
        cb();
    },900);
}

/* CORE */
function spin(){

    let bet=10;
    if(fs<=0){
        if(p<bet) return;
        p-=bet;
    }else fs--;

    spinAnim(()=>{

        let g=[];
        cells.forEach(c=>{
            let s=r();
            c.innerText=s;
            c.classList.remove("win");
            g.push(s);
        });

        let reward=0;
        let scatter=0;

        /* PAYLINE */
        for(let i=0;i<3;i++){
            let r=i*5;
            if(g[r]==g[r+1] && g[r]==g[r+2]){
                reward+=50;
                cells[r].classList.add("win");
                cells[r+1].classList.add("win");
                cells[r+2].classList.add("win");
            }
        }

        /* SCATTER */
        g.forEach(s=>{
            if(s==="🌟") scatter++;
        });

        if(scatter>=3){
            fs+=5;
            reward+=100;
            document.body.classList.add("shake");
            setTimeout(()=>document.body.classList.remove("shake"),400);
        }

        if(reward>0){
            p+=reward;
            x+=reward;

            show(reward);
            document.getElementById("res").innerText="🔥 WIN "+reward;
        } else {
            document.getElementById("res").innerText="💨 Lose";
        }

        update();

        if(auto) setTimeout(spin,500);
    });
}

/* AUTO */
function autoToggle(){
    auto=!auto;
    if(auto) spin();
}

/* UI */
function update(){
    document.getElementById("p").innerText=p;
    document.getElementById("x").innerText=x;
    document.getElementById("fs").innerText=fs;
    document.getElementById("l").innerText=Math.floor(x/200)+1;
}

update();
</script>

</body>
</html>
