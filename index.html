<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Zeus Ultra Slot Simulator</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background: radial-gradient(circle at top,#2a0000,#000);
    color:white;
    text-align:center;
    overflow:hidden;
}

/* HEADER */
h1{
    color:gold;
    text-shadow:0 0 25px gold;
}

/* TOP BAR */
.top{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:10px;
    flex-wrap:wrap;
}

.box{
    background:rgba(0,0,0,0.5);
    border:1px solid gold;
    padding:8px 14px;
    border-radius:10px;
    font-size:14px;
}

/* SLOT FRAME */
.frame{
    margin-top:20px;
    display:inline-block;
    padding:10px;
    background:linear-gradient(#1a0000,#000);
    border:2px solid gold;
    border-radius:12px;
    box-shadow:0 0 20px rgba(255,215,0,0.4);
}

/* GRID */
.board{
    display:grid;
    grid-template-columns: repeat(5,64px);
    grid-template-rows: repeat(3,64px);
    gap:6px;
}

/* REEL */
.cell{
    width:64px;
    height:64px;
    background:#120000;
    border:1px solid gold;
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    transition:0.15s;
    filter: blur(0px);
}

/* SPIN EFFECT */
.spinning{
    filter: blur(4px);
    transform: scale(0.95);
}

/* WIN */
.win{
    background:#004d00 !important;
    box-shadow:0 0 15px lime;
    transform:scale(1.1);
}

/* BUTTONS */
button{
    padding:10px 18px;
    margin:5px;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

.spin{background:gold;}
.auto{background:#00bcd4;}

/* POPUP */
.overlay{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    background:rgba(0,0,0,0.85);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:999;
}

.overlay h1{
    font-size:50px;
    color:gold;
}

.amount{
    font-size:40px;
    color:#00ffcc;
}

/* SHAKE */
.shake{
    animation:shake 0.4s;
}

@keyframes shake{
    0%{transform:translate(0,0);}
    25%{transform:translate(5px,0);}
    50%{transform:translate(-5px,0);}
    75%{transform:translate(5px,0);}
    100%{transform:translate(0,0);}
}
</style>
</head>

<body>

<h1>⚡ ZEUS ULTRA SLOT SIM ⚡</h1>

<div class="top">
<div class="box">💰 <span id="points">1000</span></div>
<div class="box">⭐ LV <span id="level">1</span></div>
<div class="box">🔥 XP <span id="xp">0</span></div>
<div class="box">🎁 FS <span id="fs">0</span></div>
</div>

<div class="frame">
<div class="board" id="board"></div>
</div>

<br>

<button class="spin" onclick="spin()">SPIN ⚡</button>
<button class="auto" onclick="toggleAuto()">AUTO</button>

<div id="result"></div>

<!-- WIN POPUP -->
<div class="overlay" id="winBox">
    <h1>🎉 BIG WIN 🎉</h1>
    <div class="amount" id="winAmount">0</div>
    <button onclick="closeWin()">CONTINUE</button>
</div>

<script>
let points=1000;
let xp=0;
let freeSpin=0;
let auto=false;

const symbols=["⚡","👑","💰","🔥","💎","🌟"];

const board=document.getElementById("board");
let cells=[];

/* CREATE GRID */
for(let i=0;i<15;i++){
    let d=document.createElement("div");
    d.className="cell";
    d.innerText="❔";
    board.appendChild(d);
    cells.push(d);
}

function rand(){
    return symbols[Math.floor(Math.random()*symbols.length)];
}

/* WIN */
function showWin(v){
    document.getElementById("winBox").style.display="flex";
    document.getElementById("winAmount").innerText="+"+v;
}

function closeWin(){
    document.getElementById("winBox").style.display="none";
}

/* ANIMATION SPIN REALISTIC */
function animateSpin(cb){
    let duration=1000;
    let interval=50;

    let t=setInterval(()=>{
        cells.forEach(c=>{
            c.classList.add("spinning");
            c.innerText=rand();
        });
    },interval);

    setTimeout(()=>{
        clearInterval(t);
        cells.forEach(c=>c.classList.remove("spinning"));
        cb();
    },duration);
}

/* MAIN SPIN */
function spin(){

    let bet=10;

    if(freeSpin<=0){
        if(points<bet) return;
        points-=bet;
    } else {
        freeSpin--;
    }

    animateSpin(()=>{

        let grid=[];
        cells.forEach(c=>{
            let s=rand();
            c.innerText=s;
            c.classList.remove("win");
            grid.push(s);
        });

        let reward=0;
        let scatter=0;

        /* PAYLINE */
        for(let r=0;r<3;r++){
            let i=r*5;
            if(grid[i]==grid[i+1] && grid[i]==grid[i+2]){
                reward+=50;
                cells[i].classList.add("win");
                cells[i+1].classList.add("win");
                cells[i+2].classList.add("win");
            }
        }

        /* SCATTER */
        grid.forEach(s=>{
            if(s==="🌟") scatter++;
        });

        if(scatter>=3){
            freeSpin+=5;
            reward+=100;
            document.body.classList.add("shake");
            setTimeout(()=>document.body.classList.remove("shake"),400);
        }

        if(reward>0){
            points+=reward;
            xp+=reward;

            showWin(reward);
            document.getElementById("result").innerText="🔥 WIN "+reward;
        } else {
            document.getElementById("result").innerText="💨 Lose";
        }

        updateUI();

        if(auto) setTimeout(spin,600);

    });
}

/* AUTO */
function toggleAuto(){
    auto=!auto;
    if(auto) spin();
}

/* UI */
function updateUI(){
    document.getElementById("points").innerText=points;
    document.getElementById("xp").innerText=xp;
    document.getElementById("fs").innerText=freeSpin;
    document.getElementById("level").innerText=Math.floor(xp/200)+1;
}

updateUI();
</script>

</body>
</html>
