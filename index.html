<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Imperial Fortune Slot (Zeus Style Edit)</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle, #2b0a0a, #000);
    color: white;
    text-align: center;
}

/* HEADER */
.header {
    padding: 10px;
    font-size: 22px;
    color: gold;
    font-weight: bold;
}

/* SLOT BOARD */
.board {
    display: grid;
    grid-template-columns: repeat(5, 80px);
    grid-template-rows: repeat(3, 80px);
    gap: 6px;
    justify-content: center;
    margin-top: 20px;
}

.cell {
    width: 80px;
    height: 80px;
    background: linear-gradient(#7a0000, #300000);
    border: 2px solid gold;
    font-size: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    box-shadow: 0 0 10px #ffcc00;
}

/* CONTROL */
.controls {
    margin-top: 20px;
}

button {
    padding: 12px 40px;
    font-size: 18px;
    font-weight: bold;
    background: gold;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #ffe066;
}

/* INFO */
.info {
    margin-top: 15px;
    font-size: 18px;
}

.win {
    color: #00ff99;
    font-weight: bold;
}

.lose {
    color: #ff4d4d;
}
</style>
</head>

<body>

<div class="header">🐉 IMPERIAL FORTUNE SLOT (SIMULATION)</div>

<div class="info">
    💰 Poin: <span id="points">1000</span>
</div>

<div class="board" id="board"></div>

<div class="controls">
    <button onclick="spin()">SPIN</button>
</div>

<div id="result"></div>

<script>
let points = 1000;

const symbols = ["🐉","💰","🪙","🔥","👑"];

const board = document.getElementById("board");

/* CREATE GRID 5x3 */
let cells = [];

for(let i=0;i<15;i++){
    let div = document.createElement("div");
    div.className = "cell";
    div.innerText = "❔";
    board.appendChild(div);
    cells.push(div);
}

function randomSymbol(){
    return symbols[Math.floor(Math.random()*symbols.length)];
}

function spin(){
    if(points <= 0){
        alert("Poin habis!");
        return;
    }

    points -= 10;

    // animasi spin cepat
    let interval = setInterval(()=>{
        cells.forEach(c=>{
            c.innerText = randomSymbol();
        });
    }, 80);

    setTimeout(()=>{
        clearInterval(interval);

        let grid = [];

        for(let i=0;i<15;i++){
            let s = randomSymbol();
            cells[i].innerText = s;
            grid.push(s);
        }

        checkWin(grid);

        document.getElementById("points").innerText = points;

    }, 1200);
}

/* WIN CHECK (horizontal lines like slot machine) */
function checkWin(g){
    let win = false;
    let reward = 0;

    for(let row=0; row<3; row++){
        let i = row * 5;

        if(g[i] === g[i+1] && g[i] === g[i+2]){
            win = true;
            reward += 50;
        }
    }

    if(win){
        points += reward;
        document.getElementById("result").innerHTML =
            `<div class="win">🔥 WIN! +${reward} POIN</div>`;
    } else {
        document.getElementById("result").innerHTML =
            `<div class="lose">💨 No win, coba lagi</div>`;
    }
}
</script>

</body>
</html>
