<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Zeus Imperial Slot PRO MAX</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: radial-gradient(circle, #1a0000, #000);
    color:white;
    text-align:center;
}

/* HEADER */
h1 {
    color: gold;
    text-shadow: 0 0 20px gold;
}

/* SLOT GRID */
.board {
    display:grid;
    grid-template-columns: repeat(5, 70px);
    grid-template-rows: repeat(3, 70px);
    gap:5px;
    justify-content:center;
    margin-top:20px;
}

.cell {
    width:70px;
    height:70px;
    background:#220000;
    border:2px solid gold;
    font-size:35px;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:8px;
    box-shadow:0 0 10px gold;
}

/* PAYLINE highlight */
.win {
    background:#003300 !important;
    box-shadow:0 0 15px lime !important;
}

/* CONTROL */
button {
    padding:10px 25px;
    margin:5px;
    border:none;
    font-weight:bold;
    cursor:pointer;
    border-radius:6px;
}

.spinbtn { background: gold; }
.autobtn { background: #00bcd4; }

input {
    width:80px;
    padding:5px;
}

/* INFO */
.panel {
    margin-top:10px;
    font-size:14px;
    color:#ccc;
}

.history {
    max-height:120px;
    overflow:auto;
    font-size:12px;
    color:#aaa;
    margin-top:10px;
}

/* FLASH */
.flash {
    position:fixed;
    width:100%;
    height:100%;
    background:white;
    opacity:0;
    pointer-events:none;
}
</style>
</head>

<body>

<div class="flash" id="flash"></div>

<h1>⚡ ZEUS IMPERIAL SLOT PRO MAX ⚡</h1>

<div class="panel">
💰 Poin: <span id="points">1000</span> |
⭐ Level: <span id="level">1</span> |
🔥 XP: <span id="xp">0</span>
</div>

<br>

Bet: <input type="number" id="bet" value="10" min="1">

<div class="board" id="board"></div>

<br>

<button class="spinbtn" onclick="spin()">SPIN ⚡</button>
<button class="autobtn" onclick="toggleAuto()">AUTO</button>

<div id="result"></div>

<h3>📜 HISTORY</h3>
<div class="history" id="history"></div>

<script>
let points = localStorage.getItem("p") ? +localStorage.getItem("p") : 1000;
let xp = localStorage.getItem("x") ? +localStorage.getItem("x") : 0;
let auto = false;

const symbols = ["⚡","👑","💰","🔥","💎"];

let board = document.getElementById("board");
let cells = [];

/* CREATE GRID */
for(let i=0;i<15;i++){
    let d = document.createElement("div");
    d.className = "cell";
    d.innerText = "❔";
    board.appendChild(d);
    cells.push(d);
}

function updateUI(){
    document.getElementById("points").innerText = points;
    document.getElementById("xp").innerText = xp;
    document.getElementById("level").innerText = Math.floor(xp/200)+1;

    localStorage.setItem("p",points);
    localStorage.setItem("x",xp);
}

function rand(){
    return symbols[Math.floor(Math.random()*symbols.length)];
}

function flash(){
    let f = document.getElementById("flash");
    f.style.opacity = 1;
    setTimeout(()=>f.style.opacity=0,150);
}

function log(t){
    document.getElementById("history").innerHTML = t + "<br>" + document.getElementById("history").innerHTML;
}

/* SPIN CORE */
function spin(){

    let bet = +document.getElementById("bet").value;
    if(points < bet) return alert("Poin tidak cukup");

    points -= bet;

    let interval = setInterval(()=>{
        cells.forEach(c=>c.innerText = rand());
    },70);

    setTimeout(()=>{

        clearInterval(interval);

        let grid = [];

        cells.forEach(c=>{
            let s = rand();
            c.innerText = s;
            grid.push(s);
            c.classList.remove("win");
        });

        let reward = 0;
        let combo = 1;

        // PAYLINE CHECK (3 garis horizontal)
        for(let r=0;r<3;r++){
            let i = r*5;
            if(grid[i]==grid[i+1] && grid[i]==grid[i+2]){
                reward += bet*3;
                combo++;
                cells[i].classList.add("win");
                cells[i+1].classList.add("win");
                cells[i+2].classList.add("win");
            }
        }

        if(reward > 0){
            flash();
            xp += reward;
            points += reward;

            if(combo>=3){
                reward *= 2;
                flash();
                document.getElementById("result").innerHTML = "🔥 MEGA JACKPOT x"+combo;
            } else {
                document.getElementById("result").innerHTML = "⚡ WIN +" + reward;
            }
        } else {
            document.getElementById("result").innerHTML = "💨 Lose";
        }

        log(grid.join("") + " → " + reward);

        updateUI();

        if(auto) setTimeout(spin,800);

    },1200);
}

function toggleAuto(){
    auto = !auto;
    if(auto) spin();
}

updateUI();
</script>

</body>
</html>
