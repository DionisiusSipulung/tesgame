<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Zeus Thunder Slot PRO</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle, #0b0b1a, #000);
    color: white;
    text-align: center;
    overflow-x: hidden;
}

/* lightning flash */
.flash {
    position: fixed;
    width: 100%;
    height: 100%;
    background: white;
    opacity: 0;
    pointer-events: none;
}

h1 {
    color: #ffd700;
    text-shadow: 0 0 15px #ffd700;
}

.slot {
    display: flex;
    justify-content: center;
    margin: 30px 0;
}

.reel {
    width: 90px;
    height: 90px;
    border: 3px solid #ffd700;
    margin: 0 10px;
    font-size: 45px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #111;
    border-radius: 12px;
    box-shadow: 0 0 20px #ffd700;
}

button {
    padding: 12px 25px;
    font-size: 16px;
    border: none;
    background: #ffd700;
    color: black;
    cursor: pointer;
    border-radius: 5px;
    font-weight: bold;
    margin-top: 10px;
}

button:hover {
    background: #ffea70;
}

.panel {
    margin-top: 20px;
    font-size: 15px;
}

.history {
    margin-top: 20px;
    max-height: 120px;
    overflow-y: auto;
    font-size: 13px;
    color: #aaa;
}

.glow {
    text-shadow: 0 0 10px #ffd700;
}

input {
    padding: 5px;
    width: 80px;
}
</style>
</head>

<body>

<div class="flash" id="flash"></div>

<h1>⚡ ZEUS THUNDER SLOT PRO ⚡</h1>

<p>Masukkan taruhan poin:</p>
<input type="number" id="bet" value="10" min="1">

<div class="slot">
    <div class="reel" id="r1">❔</div>
    <div class="reel" id="r2">❔</div>
    <div class="reel" id="r3">❔</div>
</div>

<button onclick="spin()">SPIN ⚡</button>

<div class="panel">
    💰 Poin: <span id="points">0</span><br>
    ⚡ Level Zeus: <span id="level">1</span>
</div>

<div id="result" class="glow"></div>

<h3>📜 History</h3>
<div class="history" id="history"></div>

<!-- SOUND -->
<audio id="spinSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>
<audio id="winSound" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

<script>
let points = localStorage.getItem("points") ? parseInt(localStorage.getItem("points")) : 100;
let xp = localStorage.getItem("xp") ? parseInt(localStorage.getItem("xp")) : 0;

const symbols = ["⚡","👑","🪙","🔱","💎"];

function updateUI(){
    document.getElementById("points").innerText = points;
    document.getElementById("level").innerText = Math.floor(xp / 100) + 1;
}

function save(){
    localStorage.setItem("points", points);
    localStorage.setItem("xp", xp);
}

function flashScreen(){
    let f = document.getElementById("flash");
    f.style.opacity = 1;
    setTimeout(()=>{ f.style.opacity = 0; }, 150);
}

function addHistory(text){
    let h = document.getElementById("history");
    h.innerHTML = text + "<br>" + h.innerHTML;
}

function spin(){
    let bet = parseInt(document.getElementById("bet").value);
    if(points < bet){
        alert("Poin tidak cukup!");
        return;
    }

    points -= bet;

    document.getElementById("spinSound").play();

    const r1 = document.getElementById("r1");
    const r2 = document.getElementById("r2");
    const r3 = document.getElementById("r3");

    let interval = setInterval(()=>{
        r1.innerText = symbols[Math.floor(Math.random()*symbols.length)];
        r2.innerText = symbols[Math.floor(Math.random()*symbols.length)];
        r3.innerText = symbols[Math.floor(Math.random()*symbols.length)];
    }, 80);

    setTimeout(()=>{
        clearInterval(interval);

        let a = symbols[Math.floor(Math.random()*symbols.length)];
        let b = symbols[Math.floor(Math.random()*symbols.length)];
        let c = symbols[Math.floor(Math.random()*symbols.length)];

        r1.innerText = a;
        r2.innerText = b;
        r3.innerText = c;

        let reward = 0;
        let msg = "";

        if(a === b && b === c){
            reward = bet * 10;
            msg = "🔥 JACKPOT ZEUS +"+reward;
            flashScreen();
            document.getElementById("winSound").play();
        }
        else if(a===b || b===c || a===c){
            reward = bet * 3;
            msg = "⚡ WIN +"+reward;
        }
        else{
            msg = "💨 LOSE";
        }

        points += reward;
        xp += reward;

        addHistory(`${a}${b}${c} → ${msg}`);

        updateUI();
        save();

        document.getElementById("result").innerText = msg;

    }, 1200);
}

updateUI();
</script>

</body>
</html>
